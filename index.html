<style>
:root{
  --g9:#0f2d13;--g8:#1a4a20;--g7:#236029;--g6:#2d7a35;--g5:#3a9944;
  --g4:#5ab865;--g3:#85cf8e;--g2:#b5e4ba;--g1:#daf0dc;--g0:#f0faf1;
  --sky:#185fa5;--sky0:#e6f1fb;--red:#a32d2d;--red0:#fcebeb;
  --amb:#854f0b;--amb0:#faeeda;--pur:#533ab7;--pur0:#eeedfe;

  --bdr:rgba(10,31,13,0.12);--surf:#fff;--bg:#f4f7f4;

}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:15px;-webkit-tap-highlight-color:transparent}
h1,h2,h3{font-family:'Fraunces',serif}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--g9);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transform:translateX(-100%);transition:transform .25s}
.sidebar.open{transform:translateX(0)}
@media(min-width:768px){.sidebar{transform:translateX(0)}.main{margin-left:240px}.hamburger{display:none!important}}
.main{flex:1;min-height:100vh}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199}
.overlay.show{display:block}
.sb-brand{padding:1.2rem 1rem .9rem;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brand h1{font-size:.95rem;color:var(--g2);line-height:1.2}
.sb-brand span{font-size:.68rem;color:var(--g5);font-family:'DM Sans',sans-serif;font-weight:300}
.sb-nav{flex:1;padding:.4rem 0;overflow-y:auto}
.sb-sec{padding:.55rem 1rem .1rem;font-size:.6rem;color:var(--g6);text-transform:uppercase;letter-spacing:.1em;font-weight:500}
.sb-item{display:flex;align-items:center;gap:9px;padding:.58rem 1rem;cursor:pointer;color:var(--g3);font-size:.83rem;transition:all .15s;border-left:3px solid transparent}
.sb-item:hover{background:rgba(255,255,255,.05);color:var(--g1)}
.sb-item.active{background:rgba(58,153,68,.15);color:var(--g2);border-left-color:var(--g4)}
.sb-item svg{width:16px;height:16px;flex-shrink:0}
.sb-user{padding:.85rem 1rem;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px}
.av{width:32px;height:32px;background:var(--g7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.75rem;color:var(--g2);flex-shrink:0}
.sb-ui{flex:1;min-width:0}
.sb-ui p{font-size:.78rem;color:var(--g2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-ui span{font-size:.66rem;color:var(--g5)}
.btn-out{background:none;border:none;cursor:pointer;color:var(--g6);padding:4px;border-radius:4px;display:flex}
.btn-out:hover{color:var(--g4)}
.topbar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:.8rem 1rem .8rem 1.1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h2{font-size:1.1rem;color:var(--g9);font-weight:600}
.hamburger{background:none;border:none;cursor:pointer;color:var(--g8);padding:5px;border-radius:6px;display:flex}
.tb-badge{background:var(--g1);color:var(--g7);font-size:.68rem;padding:3px 9px;border-radius:20px;font-weight:500}
.page{padding:.9rem}
.field{margin-bottom:.9rem}
.field label{display:block;font-size:.72rem;font-weight:500;color:var(--txs);margin-bottom:.28rem;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%;padding:.65rem .85rem;border:1.5px solid var(--bdr);border-radius:var(--r8);font-size:.88rem;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);outline:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--g6);background:#fff}
.field textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
@media(max-width:480px){.form-row{grid-template-columns:1fr}}
.btn{display:inline-flex;align-items:center;gap:6px;padding:.6rem 1rem;border-radius:var(--r8);font-size:.83rem;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .15s;border:none}
.btn-p{background:var(--g8);color:var(--g1)}.btn-p:hover{background:var(--g7)}
.btn-s{background:var(--bg);border:1.5px solid var(--bdr);color:var(--txs)}.btn-s:hover{background:#e8ece8}
.btn-d{background:var(--red0);color:var(--red);border:1px solid #f7c1c1}.btn-d:hover{background:#f7c1c1}
.btn-w{background:#25d366;color:#fff}.btn-w:hover{background:#1da851}
.btn-sm{padding:.38rem .7rem;font-size:.76rem;border-radius:6px;border:1px solid var(--bdr);background:var(--surf);color:var(--txs);cursor:pointer;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:4px}
.btn-sm:hover{background:var(--bg)}
.btn-full{width:100%;justify-content:center}
.btn-add{background:none;border:1.5px dashed var(--bdr);border-radius:var(--r8);padding:.42rem;font-size:.78rem;color:var(--txm);cursor:pointer;width:100%;margin-top:.3rem;font-family:'DM Sans',sans-serif}
.btn-add:hover{background:var(--bg);color:var(--g6);border-color:var(--g4)}
.card{background:var(--surf);border-radius:var(--r12);border:1px solid var(--bdr);overflow:hidden;margin-bottom:.9rem}
.card-hdr{padding:.85rem 1.1rem;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:.5rem;flex-wrap:wrap}
.card-hdr h3{font-size:.88rem;font-family:'DM Sans',sans-serif;font-weight:500}
.card-body{padding:1rem}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:.65rem;margin-bottom:.9rem}
@media(min-width:550px){.stats{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--surf);border-radius:var(--r12);padding:.9rem;border:1px solid var(--bdr)}
.stat .lbl{font-size:.68rem;color:var(--txm);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.25rem}
.stat .val{font-size:1.6rem;font-family:'Fraunces',serif;color:var(--g8);font-weight:600;line-height:1}
.stat .sub{font-size:.7rem;color:var(--txm);margin-top:.18rem}
.banner{border-radius:var(--r12);padding:.85rem 1rem;margin-bottom:.9rem;display:flex;align-items:flex-start;gap:.7rem;border:1px solid}
.banner.warn{background:var(--amb0);border-color:#fac775}
.banner.info{background:var(--g0);border-color:var(--g2)}
.banner.err{background:var(--red0);border-color:#f7c1c1}
.banner p{font-size:.83rem;font-weight:500}
.banner span.ico{font-size:1.3rem;flex-shrink:0}
.banner .txt span{font-size:.77rem;opacity:.85;margin-top:2px;display:block}
.em-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.7rem;margin-bottom:.9rem}
.em-card{border-radius:var(--r12);padding:.95rem 1rem;border:1px solid;display:flex;align-items:center;gap:.85rem;text-decoration:none;transition:transform .15s}
.em-card:hover{transform:translateY(-2px)}
.em-card.police{background:var(--sky0);border-color:#b5d4f4}
.em-card.fire{background:var(--red0);border-color:#f7c1c1}
.em-card.medical{background:var(--amb0);border-color:#fac775}
.em-card.community{background:var(--g0);border-color:var(--g2)}
.em-card.other{background:var(--pur0);border-color:#afa9ec}
.em-ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.3rem}
.police .em-ico{background:var(--sky)}.fire .em-ico{background:var(--red)}
.medical .em-ico{background:var(--amb)}.community .em-ico{background:var(--g7)}.other .em-ico{background:var(--pur)}
.em-ico svg{width:20px;height:20px;fill:#fff}
.em-info h4{font-size:.85rem;font-weight:500}
.em-num{font-family:'Fraunces',serif;font-size:1.25rem;font-weight:600;margin-top:1px}
.police .em-num{color:var(--sky)}.fire .em-num{color:var(--red)}
.medical .em-num{color:var(--amb)}.community .em-num{color:var(--g7)}.other .em-num{color:var(--pur)}
.em-info small{font-size:.73rem;color:var(--txm)}
/* MAP */
.map-container{width:100%;height:420px;border-radius:var(--r12);overflow:hidden;border:1px solid var(--bdr);margin-bottom:.9rem;background:#e8f0e8}
@media(min-width:600px){.map-container{height:500px}}
.map-no-key{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;color:var(--txm);font-size:.88rem}
.map-fallback{width:100%;height:420px;border-radius:var(--r12);overflow:hidden;border:1px solid var(--bdr);margin-bottom:.9rem}
@media(min-width:600px){.map-fallback{height:500px}}
.map-fallback iframe{display:block;width:100%;height:100%;border:0}
/* PROTO */
.proto-level{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:.73rem;font-weight:500;margin-bottom:.65rem}
.proto-level.green{background:var(--g1);color:var(--g7)}
.proto-level.amber{background:var(--amb0);color:var(--amb)}
.proto-level.red{background:var(--red0);color:var(--red)}
.proto-steps{display:flex;flex-direction:column;gap:.55rem}
.proto-step{display:flex;gap:.85rem;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r12);padding:.85rem .95rem}
.step-n{width:28px;height:28px;background:var(--g8);color:var(--g1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;flex-shrink:0}
.step-b h4{font-size:.85rem;font-weight:500;margin-bottom:2px}
.step-b p{font-size:.8rem;color:var(--txm);line-height:1.5}
.proto-sec{margin-bottom:1.4rem}
/* TABLE */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:520px}
th{text-align:left;padding:.6rem .85rem;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--txm);border-bottom:1px solid var(--bdr);background:var(--bg)}
td{padding:.7rem .85rem;border-bottom:1px solid var(--bdr);font-size:.82rem;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafcfa}
/* BADGES */
.badge{padding:2px 7px;border-radius:20px;font-size:.7rem;font-weight:500}
.badge.green{background:var(--g1);color:var(--g7)}
.badge.amber{background:var(--amb0);color:var(--amb)}
.badge.red{background:var(--red0);color:var(--red)}
.badge.sky{background:var(--sky0);color:var(--sky)}
.badge.gray{background:#f1efe8;color:#5f5e5a}
.badge.pur{background:var(--pur0);color:var(--pur)}
/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:580px){.modal-ov{align-items:center;padding:1rem}}
.modal{background:var(--surf);border-radius:16px 16px 0 0;width:100%;max-height:92vh;overflow-y:auto}
@media(min-width:580px){.modal{border-radius:16px;max-width:520px;max-height:88vh}}
.modal-hdr{padding:.95rem 1.2rem;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surf);z-index:1}
.modal-hdr h3{font-size:.98rem;font-weight:600;color:var(--g9)}
.btn-x{background:none;border:none;cursor:pointer;color:var(--txm);font-size:1.4rem;line-height:1;padding:2px 5px;border-radius:4px}
.btn-x:hover{color:var(--tx);background:var(--bg)}
.modal-body{padding:1.1rem}
.modal-ftr{padding:.85rem 1.2rem;border-top:1px solid var(--bdr);display:flex;gap:.6rem;justify-content:flex-end}
/* SEARCH */
.search-bar{display:flex;gap:.55rem;margin-bottom:1rem}
.search-bar input{flex:1;padding:.7rem .85rem;border:1.5px solid var(--bdr);border-radius:var(--r12);font-size:.88rem;font-family:'DM Sans',sans-serif;background:var(--surf);outline:none;color:var(--tx)}
.search-bar input:focus{border-color:var(--g6)}
.result{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r12);padding:.9rem;margin-bottom:.55rem}
.result h4{font-size:.88rem;font-weight:500}
.result p{font-size:.78rem;color:var(--txm);line-height:1.5}
.pchip{display:inline-block;background:var(--sky0);color:var(--sky);padding:2px 8px;border-radius:20px;font-size:.77rem;font-weight:500;margin:2px 3px 0 0;text-decoration:none}
.phone-row{display:flex;gap:.38rem;margin-bottom:.38rem}
.phone-row input{flex:1}
.del-btn{background:none;border:1.5px solid var(--bdr);border-radius:6px;padding:0 .55rem;cursor:pointer;color:var(--txm);font-size:1rem;height:38px}
.del-btn:hover{color:var(--red);border-color:var(--red);background:var(--red0)}
.divider{height:1px;background:var(--bdr);margin:.9rem 0}
.empty{text-align:center;padding:2rem 1rem;color:var(--txm)}
.empty .big{font-size:2.2rem;margin-bottom:.65rem}
/* SYNC */
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.sync-dot.ok{background:#3a9944}.sync-dot.off{background:#e24b4a}.sync-dot.wait{background:#ef9f27;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* ALERT */
.alert-panel{background:var(--surf);border-radius:var(--r12);border:1px solid var(--bdr);overflow:hidden;margin-bottom:.9rem}
.alert-levels{display:grid;grid-template-columns:repeat(3,1fr)}
.al-btn{padding:.9rem .5rem;text-align:center;cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;border-bottom:3px solid transparent;transition:all .15s;color:var(--txm)}
.al-btn:hover{background:var(--bg)}
.al-btn.sel.green{color:var(--g7);border-bottom-color:var(--g6);background:var(--g0)}
.al-btn.sel.amber{color:var(--amb);border-bottom-color:var(--amb);background:var(--amb0)}
.al-btn.sel.red{color:var(--red);border-bottom-color:var(--red);background:var(--red0)}
.al-body{padding:1rem}
/* INCIDENTS */
.inc-row{display:flex;gap:.8rem;align-items:flex-start;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r12);padding:.85rem;margin-bottom:.55rem}
.inc-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.inc-icon.green{background:var(--g1)}.inc-icon.amber{background:var(--amb0)}.inc-icon.red{background:var(--red0)}
.inc-info h4{font-size:.85rem;font-weight:500}
.inc-info p{font-size:.77rem;color:var(--txm);line-height:1.4;margin-top:2px}
.inc-meta{font-size:.7rem;color:var(--txm);margin-top:4px}
/* INFRA */
.infra-type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.55rem;margin-bottom:1rem}
.type-btn{padding:.7rem .5rem;text-align:center;border:1.5px solid var(--bdr);border-radius:var(--r8);cursor:pointer;background:var(--surf);font-family:'DM Sans',sans-serif;font-size:.78rem;color:var(--txs);transition:all .15s}
.type-btn:hover,.type-btn.sel{background:var(--g0);border-color:var(--g4);color:var(--g7)}
.type-btn .tico{font-size:1.4rem;display:block;margin-bottom:3px}
.infra-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r12);padding:.85rem;margin-bottom:.5rem;display:flex;gap:.75rem;align-items:flex-start}
.infra-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;background:var(--pur0)}
.infra-info h4{font-size:.85rem;font-weight:500}
.infra-info p{font-size:.78rem;color:var(--txm);line-height:1.4;margin-top:2px}
/* LOGIN */
.login-page{min-height:100vh;display:flex;flex-direction:column}
.login-hero{background:var(--g9);padding:2.2rem 1.5rem 1.8rem;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;overflow:hidden}
.login-hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(60deg,transparent,transparent 40px,rgba(255,255,255,.012) 40px,rgba(255,255,255,.012) 41px)}
.shield{width:64px;height:64px;background:var(--g7);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;display:flex;align-items:center;justify-content:center;margin-bottom:.9rem;position:relative;z-index:1}
.shield svg{width:32px;height:32px;fill:var(--g2)}
.login-hero h1{font-size:1.7rem;color:var(--g2);line-height:1.1;position:relative;z-index:1}
.login-hero p{font-size:.75rem;color:var(--g5);margin-top:.35rem;letter-spacing:.1em;text-transform:uppercase;font-family:'DM Sans',sans-serif;position:relative;z-index:1}
.login-hero small{font-size:.78rem;color:var(--g4);margin-top:.8rem;line-height:1.5;max-width:280px;position:relative;z-index:1}
.login-body{flex:1;padding:1.4rem;max-width:420px;width:100%;margin:0 auto}
.tab-row{display:flex;gap:.4rem;margin-bottom:1.1rem;background:var(--bg);border-radius:var(--r8);padding:4px}
.tab{flex:1;padding:.5rem;border:none;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;background:transparent;color:var(--txm);transition:all .15s}
.tab.active{background:var(--surf);color:var(--g8)}
.err-box{background:var(--red0);color:var(--red);padding:.6rem .85rem;border-radius:var(--r8);font-size:.8rem;margin-bottom:.85rem;border-left:3px solid var(--red)}
.demo-box{font-size:.76rem;color:var(--txm);margin-top:.9rem;padding:.7rem;background:var(--g0);border-radius:var(--r8);line-height:1.7}
.demo-box strong{color:var(--g7)}
.inline-hint{font-size:.72rem;color:var(--txm);background:var(--amb0);border-radius:6px;padding:.38rem .65rem;display:inline-flex;align-items:center;gap:4px;margin-bottom:.7rem}
/* MAP TABS */
.map-tabs{display:flex;gap:.4rem;margin-bottom:.75rem;background:var(--bg);border-radius:var(--r8);padding:4px}
.map-tab{flex:1;padding:.45rem;border:none;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;background:transparent;color:var(--txm);transition:all .15s;text-align:center}
.map-tab.active{background:var(--surf);color:var(--g8)}
/* PROFILE */
.profile-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r12);padding:1.2rem;margin-bottom:.9rem;display:flex;align-items:center;gap:1rem}
.profile-av{width:56px;height:56px;background:var(--g7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:1.2rem;color:var(--g2);flex-shrink:0}

<body>

async function fbSet(col,id,data){ await waitFirebase(); const {doc,setDoc,serverTimestamp}=window._fs; await setDoc(doc(window._db,col,String(id)),{...data,_ts:serverTimestamp()}); }
async function fbDel(col,id){ await waitFirebase(); const {doc,deleteDoc}=window._fs; await deleteDoc(doc(window._db,col,String(id))); }

/* ── WA message ── */
function buildWAMsg(level,desc,session,myHouse){
  const icons={green:'🟢',amber:'🟡',red:'🔴'};
  const labels={green:'AVISO — Situación sospechosa',amber:'⚠️ ALERTA MODERADA',red:'🚨 EMERGENCIA GRAVE'};
  const now=new Date();
  const hora=now.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
  const fecha=now.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'});
  return `${icons[level]} FRENTE DE SEGURIDAD\nSango Parte Alta · Guarne, Ant.\n━━━━━━━━━━━━━━━━\n📍 Finca: ${myHouse?.name||'Sin registrar'}\n👤 Reporta: ${session.name}\n📞 Contacto: ${session.phone||'—'}\n🕐 ${fecha} ${hora}\n━━━━━━━━━━━━━━━━\n${labels[level]}\n📝 ${desc||'Sin descripción adicional.'}\n━━━━━━━━━━━━━━━━\n📞 Coordinador: ${WA_COORDINATOR}`;
}

/* ══════════ GOOGLE MAPS COMPONENT ══════════ */
function GMap({houses,infra,showInfra,onMapClick,clickable}){
  const ref = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef([]);
  const clickListenerRef = useRef(null);
  const onMapClickRef = useRef(onMapClick);
  useEffect(()=>{ onMapClickRef.current = onMapClick; },[onMapClick]);

  useEffect(()=>{
    if(!hasMapsKey()) return;
    waitMaps().then(()=>{
      if(!ref.current) return;
      const map = new window.google.maps.Map(ref.current,{
        center:MAP_CENTER, zoom:15,
        mapTypeId:'hybrid',
        mapTypeControl:false,
        streetViewControl:false,
        fullscreenControl:true,
        zoomControl:true,
      });
      mapRef.current = map;
      renderMarkers(map,houses,infra,showInfra);
    });
  },[]);

  // Add/remove click listener whenever clickable changes
  useEffect(()=>{
    if(!mapRef.current||!hasMapsKey()) return;
    if(clickListenerRef.current){
      window.google.maps.event.removeListener(clickListenerRef.current);
      clickListenerRef.current = null;
      mapRef.current.setOptions({draggableCursor:''});
    }
    if(clickable){
      mapRef.current.setOptions({draggableCursor:'crosshair'});
      clickListenerRef.current = mapRef.current.addListener('click',e=>{
        const lat = e.latLng.lat().toFixed(6);
        const lng = e.latLng.lng().toFixed(6);
        onMapClickRef.current && onMapClickRef.current({lat,lng});
      });
    }
  },[clickable]);

  useEffect(()=>{
    if(!mapRef.current||!hasMapsKey()) return;
    markersRef.current.forEach(m=>m.setMap(null));
    markersRef.current=[];
    renderMarkers(mapRef.current,houses,infra,showInfra);
  },[houses,infra,showInfra]);

  function renderMarkers(map,houses,infra,showInfra){
    const iw = new window.google.maps.InfoWindow();
    // House markers
    houses.forEach(h=>{
      if(!h.lat||!h.lng) return;
      const marker = new window.google.maps.Marker({
        position:{lat:parseFloat(h.lat),lng:parseFloat(h.lng)},
        map,
        title:h.name,
        icon:{
          path:window.google.maps.SymbolPath.CIRCLE,
          scale:10,
          fillColor:'#1a4a20',
          fillOpacity:1,
          strokeColor:'#fff',
          strokeWeight:2,
        }
      });
      marker.addListener('click',()=>{
        iw.setContent(`<div style="font-family:sans-serif;padding:4px;min-width:160px"><strong style="font-size:13px">${h.name}</strong><p style="font-size:11px;color:#555;margin:3px 0">${h.owner} · ${h.type}</p><p style="font-size:11px;color:#555;margin:2px 0">${h.description||''}</p>${h.phones.map(p=>`<a href="tel:${p}" style="font-size:12px;color:#185fa5;display:block;margin-top:4px">📞 ${p}</a>`).join('')}</div>`);
        iw.open(map,marker);
      });
      markersRef.current.push(marker);
    });
    // Infra markers
    if(showInfra) infra.forEach(item=>{
      if(!item.lat||!item.lng) return;
      const t = INFRA_TYPES.find(x=>x.id===item.type)||INFRA_TYPES[4];
      const marker = new window.google.maps.Marker({
        position:{lat:parseFloat(item.lat),lng:parseFloat(item.lng)},
        map,
        title:item.name,
        icon:{
          path:window.google.maps.SymbolPath.BACKWARD_CLOSED_ARROW,
          scale:8,
          fillColor:t.color,
          fillOpacity:1,
          strokeColor:'#fff',
          strokeWeight:1.5,
        }
      });
      marker.addListener('click',()=>{
        iw.setContent(`<div style="font-family:sans-serif;padding:4px;min-width:140px"><strong style="font-size:13px">${t.icon} ${item.name}</strong><p style="font-size:11px;color:#555;margin:3px 0">${t.label} · ${item.status==='activo'?'✅ Activo':'⚠️ Inactivo'}</p><p style="font-size:11px;color:#555;margin:2px 0">${item.responsible||''}</p>${item.phone?`<a href="tel:${item.phone}" style="font-size:12px;color:#185fa5;display:block;margin-top:4px">📞 ${item.phone}</a>`:''}</div>`);
        iw.open(map,marker);
      });
      markersRef.current.push(marker);
    });
  }

  if(!hasMapsKey()) return(
    <div className="map-fallback">
      <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d4454.808660218492!2d-75.45993115020094!3d6.294787254184727!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1ses!2sco!4v1778508260570!5m2!1ses!2sco" allowFullScreen="" loading="lazy" referrerPolicy="no-referrer-when-downgrade" title="Mapa Sango Parte Alta"/>
    </div>
  );
  return <div ref={ref} className="map-container"/>;
}

          {view==='profile'&&<ProfileView session={session} persistUser={persistUser}/>}

          {view==='admin_proto'&&session.role==='admin'&&<AdminProtocol protocols={protocols} persist={persistProtocol}/>}
          {view==='admin_users'&&session.role==='admin'&&<AdminUsers users={users} session={session} persistUser={persistUser} deleteUser={deleteUser}/>}

      {modal==='infra'&&<InfraModal onClose={()=>setModal(null)} onSave={async d=>{await persistInfra(d);setModal(null);}} session={session}/>}
    </div>
  );
}

/* ══ PROFILE VIEW ══ */
function ProfileView({session,persistUser}){
  const [form,setForm]=useState({name:session.name,phone:session.phone||'',username:session.username,password:'',newPassword:''});
  const [saved,setSaved]=useState(false);
  const [err,setErr]=useState('');
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const initials=n=>n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const save=async()=>{
    if(!form.name){setErr('El nombre es obligatorio.');return;}
    if(form.newPassword&&form.newPassword.length<4){setErr('La nueva contraseña debe tener al menos 4 caracteres.');return;}
    const updated={...session,name:form.name,phone:form.phone,username:form.username};
    if(form.newPassword) updated.password=form.newPassword;
    await persistUser(updated);
    setSaved(true); setErr('');
    setTimeout(()=>setSaved(false),3000);
  };
  return(<>
    <div className="profile-card">
      <div className="profile-av">{initials(form.name||session.name)}</div>
      <div>
        <p style={{fontWeight:500,fontSize:'1rem'}}>{form.name||session.name}</p>
        <p style={{fontSize:'.82rem',color:'var(--txm)'}}>{session.role==='admin'?'⭐ Coordinador':'Habitante'}</p>
        <p style={{fontSize:'.78rem',color:'var(--txm)',marginTop:3}}>{form.username}</p>
      </div>
    </div>
    {err&&<div className="banner err" style={{marginBottom:'.9rem'}}><span className="ico">⚠️</span><div className="txt"><p>{err}</p></div></div>}
    {saved&&<div className="banner info" style={{marginBottom:'.9rem'}}><span className="ico">✅</span><div className="txt"><p>Perfil actualizado correctamente</p></div></div>}
    <div className="card"><div className="card-hdr"><h3>Información personal</h3></div><div className="card-body">
      <div className="field"><label>Nombre completo *</label><input value={form.name} onChange={set('name')} placeholder="Juan Pérez"/></div>
      <div className="form-row">
        <div className="field"><label>Usuario</label><input value={form.username} onChange={set('username')} placeholder="juanperez"/></div>
        <div className="field"><label>Teléfono WhatsApp</label><input value={form.phone} onChange={set('phone')} placeholder="310..." inputMode="tel"/></div>
      </div>
    </div></div>
    <div className="card"><div className="card-hdr"><h3>Cambiar contraseña</h3></div><div className="card-body">
      <div className="form-row">
        <div className="field"><label>Contraseña actual</label><input type="password" value={form.password} onChange={set('password')} placeholder="••••••••"/></div>
        <div className="field"><label>Nueva contraseña</label><input type="password" value={form.newPassword} onChange={set('newPassword')} placeholder="••••••••"/></div>
      </div>
      <p style={{fontSize:'.75rem',color:'var(--txm)'}}>Deje en blanco si no desea cambiar la contraseña.</p>
    </div></div>
    <button className="btn btn-p btn-full" onClick={save}>💾 Guardar cambios</button>
  </>);
}

    const inf=infra.filter(x=>x.name.toLowerCase().includes(q)||(x.responsible||'').toLowerCase().includes(q)||(x.phone||'').includes(q));

      ))}

      <p style={{fontSize:'.72rem',color:'var(--txm)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'.55rem',marginTop:'.9rem',fontWeight:500}}>Infraestructura ({searchR.infra.length})</p>

          <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4}}><span style={{fontSize:'1.2rem'}}>{t.icon}</span><h4>{item.name}</h4><span className="badge pur">{t.label}</span></div>

/* ══ ALERT VIEW ══ */
function AlertView({session,myHouse,addIncident}){
  const [level,setLevel]=useState('amber');
  const [desc,setDesc]=useState('');
  const [sent,setSent]=useState(false);
  const sendAlert=async()=>{
    const msg=buildWAMsg(level,desc,session,myHouse);
    window.open(`https://wa.me/${WA_COORDINATOR}?text=${encodeURIComponent(msg)}`,'_blank');
    await addIncident({level,desc,reporter:session.name,finca:myHouse?.name||'Sin registrar',phone:session.phone||'—'});
    setSent(true); setDesc(''); setTimeout(()=>setSent(false),4000);
  };
  const descs={green:'Persona o vehículo desconocido rondando la zona.',amber:'Robo, hurto o situación de riesgo moderado.',red:'Violencia, secuestro o emergencia inmediata.'};
  return(<>
    <div className="banner err"><span className="ico">🚨</span><div className="txt"><p>Módulo de alerta al frente</p><span>Seleccione el nivel, describa brevemente y toque "Enviar por WhatsApp". Se abrirá WhatsApp con el mensaje listo para enviar.</span></div></div>
    <div className="alert-panel">
      <div className="alert-levels">
        {['green','amber','red'].map(l=><button key={l} className={`al-btn ${level===l?'sel':''} ${l}`} onClick={()=>setLevel(l)}>{l==='green'?'🟢 Sospechoso':l==='amber'?'🟡 Alerta':'🔴 Emergencia'}</button>)}
      </div>
      <div className="al-body">
        <p style={{fontSize:'.82rem',color:'var(--txm)',marginBottom:'.8rem'}}>{descs[level]}</p>
        <div className="field"><label>Descripción del evento</label><textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Describa qué está ocurriendo, características de personas o vehículos..." rows={4}/></div>
        <div style={{background:'var(--bg)',borderRadius:'var(--r8)',padding:'.75rem',marginBottom:'1rem'}}>
          <p style={{fontWeight:500,color:'var(--txs)',marginBottom:4,fontSize:'.78rem'}}>Vista previa del mensaje:</p>
          <pre style={{whiteSpace:'pre-wrap',fontFamily:'DM Sans,sans-serif',fontSize:'.73rem',lineHeight:1.5,color:'var(--txs)'}}>{buildWAMsg(level,desc||'(descripción pendiente)',session,myHouse)}</pre>
        </div>
        <button className="btn btn-w btn-full" onClick={sendAlert} style={{fontSize:'.95rem',padding:'.8rem'}}><I.wa/> Enviar alerta por WhatsApp</button>
        {sent&&<div className="banner info" style={{marginTop:'.8rem'}}><span className="ico">✅</span><div className="txt"><p>Alerta registrada. Confirme el envío en WhatsApp.</p></div></div>}
      </div>
    </div>
  </>);
}

/* ══ ADMIN: PROTOCOL ══ */
function AdminProtocol({protocols,persist}){
  const [ed,setEd]=useState(null);
  const [form,setForm]=useState({level:'green',title:'',steps:[{title:'',desc:''}]});
  const LEVELS=[{v:'green',l:'🟢 Normal'},{v:'amber',l:'🟡 Moderado'},{v:'red',l:'🔴 Grave'}];
  const save=async()=>{ if(!form.title)return; const clean={...form,steps:form.steps.filter(s=>s.title.trim())}; let list; if(ed==='new')list=[...protocols,{id:'p'+Date.now(),...clean}]; else list=protocols.map(x=>x.id===ed?{...x,...clean}:x); await persist(list); setEd(null); };
  const del=async id=>{ if(confirm('¿Eliminar?'))await persist(protocols.filter(x=>x.id!==id)); };
  const setStep=(i,k,v)=>setForm(f=>{ const steps=[...f.steps];steps[i]={...steps[i],[k]:v};return{...f,steps}; });
  return(<>
    <div className="inline-hint">✏️ Solo coordinadores pueden modificar los protocolos</div>
    <button className="btn btn-p" style={{marginBottom:'1rem'}} onClick={()=>{setEd('new');setForm({level:'green',title:'',steps:[{title:'',desc:''}]});}}><I.plus/>Nuevo protocolo</button>
    {protocols.map(p=>(
      <div key={p.id} className="card" style={{marginBottom:'.7rem'}}>
        <div className="card-hdr">
          <div><div className={`proto-level ${p.level}`}>{p.level==='green'?'🟢':p.level==='amber'?'🟡':'🔴'} {p.title}</div><p style={{fontSize:'.75rem',color:'var(--txm)'}}>{p.steps.length} pasos</p></div>
          <div style={{display:'flex',gap:5}}><button className="btn-sm" onClick={()=>{setEd(p.id);setForm({level:p.level,title:p.title,steps:p.steps.map(s=>({...s}))});}}>✏️</button><button className="btn btn-d btn-sm" onClick={()=>del(p.id)}>🗑️</button></div>
        </div>
        <div className="card-body" style={{paddingTop:'.7rem'}}>
          {p.steps.map((s,i)=><div key={i} style={{display:'flex',gap:7,marginBottom:7}}><div className="step-n" style={{width:24,height:24,fontSize:'.73rem'}}>{i+1}</div><div><p style={{fontWeight:500,fontSize:'.8rem'}}>{s.title}</p><p style={{fontSize:'.76rem',color:'var(--txm)',lineHeight:1.5}}>{s.desc}</p></div></div>)}
        </div>
      </div>
    ))}
    {ed&&<div className="modal-ov"><div className="modal" style={{maxWidth:540}}>
      <div className="modal-hdr"><h3>{ed==='new'?'Nuevo protocolo':'Editar'}</h3><button className="btn-x" onClick={()=>setEd(null)}>×</button></div>
      <div className="modal-body">
        <div className="form-row">
          <div className="field"><label>Nivel</label><select value={form.level} onChange={e=>setForm(f=>({...f,level:e.target.value}))}>{LEVELS.map(l=><option key={l.v} value={l.v}>{l.l}</option>)}</select></div>
          <div className="field"><label>Título *</label><input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="Robo o hurto..."/></div>
        </div>
        <div className="divider"/>
        <p style={{fontWeight:500,fontSize:'.85rem',marginBottom:'.7rem'}}>Pasos</p>
        {form.steps.map((s,i)=>(
          <div key={i} style={{background:'var(--bg)',borderRadius:'var(--r8)',padding:'.8rem',marginBottom:'.5rem',border:'1px solid var(--bdr)'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}><span className="badge gray">Paso {i+1}</span>{form.steps.length>1&&<button className="btn btn-d btn-sm" onClick={()=>setForm(f=>({...f,steps:f.steps.filter((_,idx)=>idx!==i)}))}>🗑️</button>}</div>
            <div className="field" style={{marginBottom:'.45rem'}}><label>Título</label><input value={s.title} onChange={e=>setStep(i,'title',e.target.value)} placeholder="Llame al 112..."/></div>
            <div className="field" style={{marginBottom:0}}><label>Descripción</label><textarea value={s.desc} onChange={e=>setStep(i,'desc',e.target.value)} rows={2}/></div>
          </div>
        ))}
        <button className="btn-add" onClick={()=>setForm(f=>({...f,steps:[...f.steps,{title:'',desc:''}]}))}><I.plus/> Agregar paso</button>
      </div>
      <div className="modal-ftr"><button className="btn btn-s" onClick={()=>setEd(null)}>Cancelar</button><button className="btn btn-p" onClick={save}>Guardar</button></div>
    </div></div>}
  </>);
}

    </table></div></div>
    {confirm&&<div className="modal-ov"><div className="modal" style={{maxWidth:380}}>
      <div className="modal-hdr"><h3>Confirmar acción</h3><button className="btn-x" onClick={()=>setConfirm(null)}>×</button></div>
      <div className="modal-body"><p style={{fontSize:'.88rem',lineHeight:1.6,color:'var(--txs)'}}>{msgs[confirm.action]}</p></div>
      <div className="modal-ftr"><button className="btn btn-s" onClick={()=>setConfirm(null)}>Cancelar</button><button className={`btn ${confirm.action==='delete'?'btn-d':'btn-p'}`} onClick={doConfirm}>{confirm.action==='promote'?'Sí, designar':confirm.action==='demote'?'Sí, revocar':'Sí, eliminar'}</button></div>
    </div></div>}
  </>);
}

/* ══ HOUSE MODAL ══ */
function HouseModal({onClose,onSave,existing,session,preLatLng}){
  const [form,setForm]=useState({name:existing?.name||'',owner:existing?.owner||session.name||'',phones:existing?.phones||[session.phone||''],type:existing?.type||'finca',description:existing?.description||'',lat:preLatLng?.lat||existing?.lat||'',lng:preLatLng?.lng||existing?.lng||''});
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const setPhone=(i,v)=>setForm(f=>{const phones=[...f.phones];phones[i]=v;return{...f,phones};});
  const save=()=>{ if(!form.name||!form.owner)return; const id=existing?.id||('h'+Date.now()); onSave({...form,id,phones:form.phones.filter(p=>p.trim()),userId:session.id,registeredAt:existing?.registeredAt||new Date().toISOString().slice(0,10)}); };
  return(
    <div className="modal-ov"><div className="modal">
      <div className="modal-hdr"><h3>{existing?'Editar mi finca':'Registrar finca / casa'}</h3><button className="btn-x" onClick={onClose}>×</button></div>
      <div className="modal-body">
        <div className="form-row">
          <div className="field"><label>Nombre *</label><input value={form.name} onChange={set('name')} placeholder="Finca La Montaña"/></div>
          <div className="field"><label>Tipo</label><select value={form.type} onChange={set('type')}>{['finca','parcela','casa','lote'].map(t=><option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>)}</select></div>
        </div>
        <div className="field"><label>Responsable *</label><input value={form.owner} onChange={set('owner')} placeholder="Juan Pérez"/></div>
        <div className="field">
          <label>Teléfonos</label>
          {form.phones.map((p,i)=>(
            <div key={i} className="phone-row"><input value={p} onChange={e=>setPhone(i,e.target.value)} placeholder={`Teléfono ${i+1}`} inputMode="tel"/>{form.phones.length>1&&<button className="del-btn" onClick={()=>setForm(f=>({...f,phones:f.phones.filter((_,idx)=>idx!==i)}))}>×</button>}</div>
          ))}
          <button className="btn-add" onClick={()=>setForm(f=>({...f,phones:[...f.phones,'']}))}>+ Agregar teléfono</button>
        </div>
        <div style={{background:'var(--g0)',border:'1px solid var(--g2)',borderRadius:'var(--r8)',padding:'.7rem',marginBottom:'.9rem'}}>
          <p style={{fontSize:'.78rem',fontWeight:500,color:'var(--g7)',marginBottom:'.35rem'}}>📍 Coordenadas GPS</p>
          <p style={{fontSize:'.72rem',color:'var(--txm)',marginBottom:'.5rem',lineHeight:1.5}}>Google Maps → mantenga presionado sobre su finca → copie los números que aparecen.</p>
          <div className="form-row">
            <div className="field" style={{marginBottom:0}}><label>Latitud</label><input value={form.lat} onChange={set('lat')} placeholder="6.2948" inputMode="decimal"/></div>
            <div className="field" style={{marginBottom:0}}><label>Longitud</label><input value={form.lng} onChange={set('lng')} placeholder="-75.4599" inputMode="decimal"/></div>
          </div>
          {form.lat&&form.lng&&<a href={`https://www.google.com/maps?q=${form.lat},${form.lng}`} target="_blank" rel="noopener noreferrer" style={{display:'inline-block',marginTop:'.45rem',fontSize:'.75rem',color:'var(--sky)',textDecoration:'underline'}}>🗺️ Verificar en Google Maps</a>}
        </div>
        <div className="field"><label>Referencia de ubicación</label><textarea value={form.description} onChange={set('description')} placeholder="Casa blanca, portón azul, 200m de la escuela..." rows={2}/></div>
      </div>
      <div className="modal-ftr"><button className="btn btn-s" onClick={onClose}>Cancelar</button><button className="btn btn-p" onClick={save}>💾 Guardar</button></div>
    </div></div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
